name: Deploy to Oracle Cloud

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'frontend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Publish backend
        run: dotnet publish backend/backend.csproj -c Release -r linux-x64 --self-contained false -o ./backend-publish

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy backend
        run: |
          tar czf backend.tar.gz -C backend-publish .
          scp backend.tar.gz ubuntu@${{ secrets.ORACLE_HOST }}:/tmp/
          ssh ubuntu@${{ secrets.ORACLE_HOST }} << 'EOF'
            sudo systemctl stop intex2
            # Preserve production config and data protection keys
            cp /opt/intex2/appsettings.Production.json /tmp/appsettings.Production.json.bak 2>/dev/null || true
            cp -r /opt/intex2/dp-keys /tmp/dp-keys-bak 2>/dev/null || true
            # Clear old binaries
            sudo rm -f /opt/intex2/*.dll /opt/intex2/*.pdb /opt/intex2/backend /opt/intex2/backend.deps.json /opt/intex2/backend.runtimeconfig.json /opt/intex2/backend.staticwebassets.endpoints.json
            sudo rm -rf /opt/intex2/wwwroot
            # Extract new binaries
            sudo tar xzf /tmp/backend.tar.gz -C /opt/intex2
            # Restore production config and dp-keys
            sudo cp /tmp/appsettings.Production.json.bak /opt/intex2/appsettings.Production.json 2>/dev/null || true
            sudo cp -r /tmp/dp-keys-bak /opt/intex2/dp-keys 2>/dev/null || true
            rm -f /tmp/backend.tar.gz /tmp/appsettings.Production.json.bak
            rm -rf /tmp/dp-keys-bak
            sudo systemctl start intex2
          EOF

      - name: Deploy frontend
        run: |
          tar czf frontend.tar.gz -C frontend/dist .
          scp frontend.tar.gz ubuntu@${{ secrets.ORACLE_HOST }}:/tmp/
          ssh ubuntu@${{ secrets.ORACLE_HOST }} << 'FRONTEND'
            sudo rm -rf /var/www/intex2/*
            sudo tar xzf /tmp/frontend.tar.gz -C /var/www/intex2
            # Restore robots.txt
            sudo tee /var/www/intex2/robots.txt > /dev/null << 'ROBOTS'
          User-agent: *
          Allow: /
          Disallow: /api/
          Sitemap: https://beaconofhope.dawsonsprojects.com/sitemap.xml
          ROBOTS
            rm -f /tmp/frontend.tar.gz
          FRONTEND

      - name: Verify deployment
        run: |
          sleep 5
          STATUS=$(ssh ubuntu@${{ secrets.ORACLE_HOST }} 'curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/api/health')
          if [ "$STATUS" -ne 200 ]; then
            echo "Deployment verification failed: HTTP $STATUS"
            ssh ubuntu@${{ secrets.ORACLE_HOST }} 'sudo journalctl -u intex2 --no-pager -n 20'
            exit 1
          fi
          echo "Deployment successful: HTTP $STATUS"
