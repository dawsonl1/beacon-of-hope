name: ML Pipeline

on:
  schedule:
    # Nightly at 3:00 AM UTC (9 PM MT)
    - cron: '0 3 * * *'
  workflow_dispatch:
    # Manual trigger — click "Run workflow" in Actions tab to test now
    inputs:
      mode:
        description: 'Which step to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all           # full pipeline: train + infer for all models
          - predictions   # inference only (skip training, use existing .sav files)

jobs:
  ml:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.ORACLE_DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH tunnel to Oracle DB
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts
          # Forward local port 5432 to Oracle VM's PostgreSQL
          ssh -f -N -L 5432:localhost:5432 ubuntu@${{ secrets.ORACLE_HOST }}
          # Wait for tunnel to be ready
          sleep 2
          echo "SSH tunnel established"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ml/requirements.txt

      - name: Install dependencies
        run: pip install -r ml/requirements.txt

      - name: Run full pipeline (train + infer)
        if: >-
          github.event_name == 'schedule' ||
          github.event.inputs.mode == 'all'
        run: python -m ml.run_all

      - name: Run inference only (use existing models)
        if: github.event.inputs.mode == 'predictions'
        run: python -m ml.run_predictions
