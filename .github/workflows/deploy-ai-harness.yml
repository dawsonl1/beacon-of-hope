name: Deploy AI Harness to Azure

on:
  push:
    branches: [main]
    paths:
      - 'ai_harness/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Prepare deployment package
        run: |
          cp ai_harness/requirements.txt requirements.txt
          zip -r deploy.zip ai_harness/ requirements.txt -x "ai_harness/.venv/*" "ai_harness/__pycache__/*" "ai_harness/tests/*"

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'intex-ai-harness'
          publish-profile: ${{ secrets.AZURE_AI_HARNESS_PUBLISH_PROFILE }}
          package: deploy.zip
          type: zip
