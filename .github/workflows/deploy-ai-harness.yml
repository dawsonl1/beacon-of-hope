name: Deploy AI Harness to Azure

on:
  push:
    branches: [main]
    paths:
      - 'ai_harness/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r ai_harness/requirements.txt

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'intex-ai-harness'
          publish-profile: ${{ secrets.AZURE_AI_HARNESS_PUBLISH_PROFILE }}
          package: .
          startup-command: 'pip install -r ai_harness/requirements.txt && uvicorn ai_harness.app:app --host 0.0.0.0 --port 8000'
