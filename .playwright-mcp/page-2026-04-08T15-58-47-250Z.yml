        - heading "9. Data Security" [level=2] [ref=e228]
        - paragraph [ref=e229]: "We implement appropriate technical and organizational measures to protect your personal data, including:"
        - list [ref=e230]:
          - listitem [ref=e231]: Encryption of data in transit using TLS (Transport Layer Security).
          - listitem [ref=e232]: Role-based access controls limiting data access to authorized personnel.
          - listitem [ref=e233]: Regular security reviews and access audits.
          - listitem [ref=e234]: Secure password storage using industry-standard hashing algorithms.
          - listitem [ref=e235]: Content Security Policy (CSP) headers to protect against cross-site scripting.
      - generic [ref=e236]:
