        - paragraph [ref=e238]: "In the event of a personal data breach, Beacon of Hope commits to:"
        - list [ref=e239]:
          - listitem [ref=e240]: Notifying the relevant supervisory authority within 72 hours of discovery, as required by GDPR and applicable U.S. law.
          - listitem [ref=e241]: Promptly notifying affected data subjects when the breach is likely to result in a risk to their rights and freedoms.
          - listitem [ref=e242]: "Following a structured response process: detect, contain, assess, notify, and remediate."
