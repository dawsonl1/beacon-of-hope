      - generic [ref=e58]:
        - heading "1. Data We Collect" [level=2] [ref=e59]
        - heading "Visitor Data" [level=3] [ref=e60]
        - paragraph [ref=e61]: When you visit our website, we may collect information about pages visited, session duration, browser type, device information, and IP address. This data is collected through cookies and similar technologies, subject to your consent preferences.
        - heading "Donor Data" [level=3] [ref=e62]
        - paragraph [ref=e63]:
          - text: When you make a donation, we collect your name, email address, donation amount, and payment method type. We do
          - strong [ref=e64]: not
          - text: store credit card numbers or full payment details -- these are processed directly by our payment processor.
        - heading "Staff / Employee Data" [level=3] [ref=e65]
        - paragraph [ref=e66]: For staff and authorized users, we collect names, email addresses, roles, and login credentials (passwords are stored using industry-standard one-way hashing and are never stored in plain text).
        - heading "Resident Data" [level=3] [ref=e67]
        - paragraph [ref=e68]:
          - text: Case records, personal histories, counseling notes, and related information about residents in our care are classified as
          - strong [ref=e69]: highly sensitive personal information
          - text: . Collection and processing of this data is governed by strict legal mandates and internal policies described in Section 3 below.
      - generic [ref=e70]:
        - heading "2. How We Use Your Data" [level=2] [ref=e71]
        - paragraph [ref=e72]: "We process personal data only with a lawful basis, as follows:"
        - list [ref=e73]:
          - listitem [ref=e74]:
            - strong [ref=e75]: "Donor data:"
            - text: Contract performance (processing your donation) and consent (communications and newsletters).
          - listitem [ref=e76]:
            - strong [ref=e77]: "Staff data:"
            - text: Contract performance (employment relationship) and legal obligation (federal and Guam reporting requirements).
          - listitem [ref=e78]:
            - strong [ref=e79]: "Resident data:"
            - text: Legal obligation (child welfare regulations under Guam and federal law) and legitimate interest (child welfare and protection).
          - listitem [ref=e80]:
            - strong [ref=e81]: "Visitor data:"
            - text: Consent (analytics cookies) and legitimate interest (essential site functionality and security).
      - generic [ref=e82]:
        - heading "3. Protection of Minors' Data" [level=2] [ref=e83]
        - paragraph [ref=e84]: Beacon of Hope is dedicated to the protection of children and their personal information. This section describes the special safeguards we apply to data related to the minors in our care.
        - list [ref=e85]:
          - listitem [ref=e86]:
            - text: Resident data -- including names, case histories, counseling notes, and health records -- is classified as
            - strong [ref=e87]: highly sensitive personal information
            - text: under GDPR Article 9 and applicable U.S. federal and Guam territorial privacy laws.
          - listitem [ref=e88]: Access is restricted to authorized staff members who have a direct case relationship with the resident.
          - listitem [ref=e89]:
            - text: Resident data is
            - strong [ref=e90]: never
            - text: shared with third parties except as required by law (e.g., mandatory reporting obligations under Guam and federal child welfare statutes).
          - listitem [ref=e91]:
            - text: Resident data is
            - strong [ref=e92]: never
            - text: used in marketing materials, public reports, or impact dashboards in any identifiable form. All public-facing statistics are aggregated and anonymized.
          - listitem [ref=e93]:
            - text: "Legal basis for processing without parental consent: regulatory mandate for accredited child welfare organizations acting"
            - emphasis [ref=e94]: in loco parentis
            - text: under applicable law.
          - listitem [ref=e95]: Data is anonymized or securely deleted when a resident turns 18 or exits the program, subject to applicable retention requirements.
          - listitem [ref=e96]:
            - text: If you believe that a minor's data has been inadvertently disclosed, please contact us immediately at
            - link "privacy@beaconofhope.org" [ref=e97] [cursor=pointer]:
              - /url: mailto:privacy@beaconofhope.org
            - text: . We commit to investigating and remediating within 48 hours.
