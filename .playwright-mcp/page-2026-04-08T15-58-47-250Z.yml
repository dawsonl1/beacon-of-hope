        - heading "GDPR Rights (EU Data Subjects)" [level=3] [ref=e166]
        - paragraph [ref=e167]: "Under the General Data Protection Regulation, you have the right to:"
        - list [ref=e168]:
          - listitem [ref=e169]:
            - strong [ref=e170]: Access
            - text: "-- request a copy of the personal data we hold about you."
          - listitem [ref=e171]:
            - strong [ref=e172]: Rectification
            - text: "-- request correction of inaccurate data."
          - listitem [ref=e173]:
            - strong [ref=e174]: Erasure
            - text: "-- request deletion of your data (\"right to be forgotten\")."
          - listitem [ref=e175]:
            - strong [ref=e176]: Restriction
            - text: "-- request that we limit processing of your data."
          - listitem [ref=e177]:
            - strong [ref=e178]: Data Portability
            - text: "-- receive your data in a structured, machine-readable format."
          - listitem [ref=e179]:
            - strong [ref=e180]: Object
            - text: "-- object to processing based on legitimate interest."
        - heading "U.S. Privacy Rights" [level=3] [ref=e181]
        - paragraph [ref=e182]: "Under applicable U.S. federal and territorial law, you have the right to:"
        - list [ref=e183]:
          - listitem [ref=e184]:
            - strong [ref=e185]: Be informed
            - text: "-- know how your data is being collected and processed."
          - listitem [ref=e186]:
            - strong [ref=e187]: Access
            - text: "-- obtain a copy of your personal data."
          - listitem [ref=e188]:
            - strong [ref=e189]: Correction
            - text: "-- have inaccurate data corrected."
          - listitem [ref=e190]:
            - strong [ref=e191]: Deletion
            - text: "-- request deletion of your data, subject to legal retention requirements."
          - listitem [ref=e192]:
            - strong [ref=e193]: Opt-out
            - text: "-- opt out of the sale or sharing of your personal data (we do not sell your data)."
        - paragraph [ref=e194]:
          - text: To exercise any of these rights, email
